version: 2

models:
  - name: stg_orders
    description: "Silver Layer clean order table, with flag when real data is missing"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null

  - name: stg_customers
    description: "Unique customers with localization (zip code, city, state)"
    columns:
      - name: customer_id
        description: "Unique customer identifier for this order"
        tests:
          - unique
          - not_null

  - name: stg_products
    description: "Product catalog with translated category to english"
    columns:
      - name: product_id
        description: "Unique identifier for the product"
        tests:
          - unique
          - not_null

  - name: stg_orders_items
    description: "Individual items for each order"
    columns:
      - name: order_id
        description: "Reference to the order. Not unique key"
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null